# ADAS Weekly Report — Deploy to GitHub Pages
#
# Generation runs locally on Mac (scripts/run_and_push.sh).
# This workflow only deploys the committed output/ to GitHub Pages.

name: Deploy ADAS Report

on:
  push:
    branches: [main]
    paths:
      - 'output/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
